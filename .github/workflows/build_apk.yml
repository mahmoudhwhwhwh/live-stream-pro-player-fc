name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.6'
          channel: 'stable'
          
      - name: Reconstruct Project Structure
        run: |
          # حفظ الملفات الحالية
          mkdir -p temp_files
          cp lib/main.dart temp_files/
          cp pubspec.yaml temp_files/
          cp -r assets temp_files/
          
          # إنشاء هيكل المشروع من جديد لضمان وجود مجلد android
          cd ..
          rm -rf live_stream_pro_player_fc
          flutter create --project-name live_stream_pro_player_fc live_stream_pro_player_fc
          cd live_stream_pro_player_fc
          
          # إعادة الملفات الخاصة بالمستخدم
          cp ../temp_files/main.dart lib/
          cp ../temp_files/pubspec.yaml .
          mkdir -p assets
          cp -r ../temp_files/assets/* assets/
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
